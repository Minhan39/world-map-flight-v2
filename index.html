<section class="flight-map-widget">

<style>

.flight-map-widget{
width:100%;
max-width:1200px;
margin:auto;
background:#06080f;
border-radius:8px;
overflow:hidden;
color:#cdc8c0;
font-family:monospace;
}

/* header */

.flight-map-widget .topbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px 20px;
border-bottom:1px solid rgba(232,184,75,.2);
}

.flight-map-widget .brand{
color:#e8b84b;
font-weight:600;
}

.flight-map-widget .year-tabs{
display:flex;
gap:6px;
}

.flight-map-widget .ytab{
border:1px solid #3d4f63;
background:none;
color:#3d4f63;
padding:4px 12px;
cursor:pointer;
}

.flight-map-widget .ytab.active{
border-color:#e8b84b;
color:#e8b84b;
}

/* map */

.flight-map-widget .map-wrap{
position:relative;
height:600px;
}

.flight-map-widget svg{
width:100%;
height:100%;
}

.flight-map-widget .country{
fill:#1c2a3e;
stroke:rgba(255,255,255,.05);
stroke-width:.35px;
}

.flight-map-widget .origin-dot{
fill:#e8b84b;
}

.flight-map-widget .arc-line{
stroke:#e8b84b;
stroke-width:1.6;
stroke-dasharray:6 5;
fill:none;
}

.flight-map-widget .plane{
fill:white;
}

.flight-map-widget .pin{
fill:#e85c3a;
}

.flight-map-widget .dest-label{
font-size:10px;
fill:#cdc8c0;
}

.flight-map-widget .info-strip{
position:absolute;
bottom:15px;
left:50%;
transform:translateX(-50%);
background:#06080fdd;
border:1px solid rgba(232,184,75,.2);
display:flex;
}

.flight-map-widget .info-item{
padding:8px 16px;
text-align:center;
}

.flight-map-widget .info-name{
color:#e8b84b;
}

.flight-map-widget .info-km{
font-size:11px;
color:#888;
}

</style>

<div class="topbar">
<div class="brand">✈ Hành Trình</div>
<div class="year-tabs"></div>
</div>

<div class="map-wrap">
<svg></svg>
<div class="info-strip"></div>
</div>

</section>


<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>


<script>

(function(){

const root=document.querySelector(".flight-map-widget")
if(!root)return

const svg=d3.select(root).select("svg")
const wrap=root.querySelector(".map-wrap")
const info=root.querySelector(".info-strip")
const tabs=root.querySelector(".year-tabs")

const width=wrap.clientWidth
const height=600

svg.attr("viewBox","0 0 "+width+" "+height)

const projection=d3.geoNaturalEarth1()
.scale(width/6.2)
.translate([width/2,height/2])

const path=d3.geoPath(projection)

const gCountries=svg.append("g")
const gLines=svg.append("g")
const gPlanes=svg.append("g")
const gPins=svg.append("g")

const JOURNEYS={
2023:{
from:[106.69,11.14],
dests:[
{name:"Thái Lan",flag:"🇹🇭",coord:[100.5,15.5],km:"1780"},
{name:"Singapore",flag:"🇸🇬",coord:[103.8,1.3],km:"1170"}
]},
2024:{
from:[106.69,11.14],
dests:[
{name:"Hoa Kỳ",flag:"🇺🇸",coord:[-98,38],km:"12900"},
{name:"Hàn Quốc",flag:"🇰🇷",coord:[127.8,36],km:"3560"}
]},
2025:{
from:[106.69,11.14],
dests:[
{name:"Nhật Bản",flag:"🇯🇵",coord:[138,36],km:"4010"},
{name:"Cuba",flag:"🇨🇺",coord:[-79.5,22],km:"16600"},
{name:"Nga",flag:"🇷🇺",coord:[100,62],km:"7200"}
]}
}

const YEARS=Object.keys(JOURNEYS)
let current=0

fetch("https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json")
.then(r=>r.json())
.then(world=>{

const countries=topojson.feature(world,world.objects.countries).features

gCountries.selectAll("path")
.data(countries)
.enter()
.append("path")
.attr("class","country")
.attr("d",path)

buildTabs()
playYear(YEARS[0])

setInterval(nextYear,4500)

})


function buildTabs(){

YEARS.forEach((yr,i)=>{

const btn=document.createElement("button")
btn.className="ytab"
btn.innerText=yr

btn.onclick=()=>{
current=i
playYear(yr)
}

tabs.appendChild(btn)

})

}


function nextYear(){

current=(current+1)%YEARS.length
playYear(YEARS[current])

}


function playYear(year){

gLines.selectAll("*").remove()
gPlanes.selectAll("*").remove()
gPins.selectAll("*").remove()

tabs.querySelectorAll(".ytab").forEach(b=>b.classList.remove("active"))
tabs.children[current].classList.add("active")

const data=JOURNEYS[year]

const from=projection(data.from)

gPins.append("circle")
.attr("class","origin-dot")
.attr("cx",from[0])
.attr("cy",from[1])
.attr("r",5)

info.innerHTML=""

data.dests.forEach(dest=>{

const to=projection(dest.coord)

const dx=to[0]-from[0]
const dy=to[1]-from[1]

const angle=Math.atan2(dy,dx)*180/Math.PI

const line=gLines.append("line")
.attr("class","arc-line")
.attr("x1",from[0])
.attr("y1",from[1])
.attr("x2",from[0])
.attr("y2",from[1])

line.transition()
.duration(2000)
.attr("x2",to[0])
.attr("y2",to[1])

const plane=gPlanes.append("text")
.attr("class","plane")
.text("✈")

const start=performance.now()

function animate(now){

const t=Math.min((now-start)/2000,1)

const x=from[0]+dx*t
const y=from[1]+dy*t

plane.attr("transform","translate("+x+","+y+") rotate("+(angle+90)+")")

if(t<1)requestAnimationFrame(animate)

}

requestAnimationFrame(animate)

const g=gPins.append("g")
.attr("transform","translate("+to[0]+","+to[1]+")")

g.append("circle")
.attr("class","pin")
.attr("r",4)

g.append("text")
.attr("class","dest-label")
.attr("x",8)
.attr("y",-5)
.text(dest.flag+" "+dest.name)

info.innerHTML+=`
<div class="info-item">
<div>${dest.flag}</div>
<div class="info-name">${dest.name}</div>
<div class="info-km">${dest.km} km</div>
</div>
`

})

}

})()

</script>
