<section class="flight-map-widget">

<style>

.flight-map-widget{
  width:100%;
  max-width:1200px;
  margin:auto;
  background:#06080f;
  border-radius:8px;
  overflow:hidden;
  color:#cdc8c0;
  font-family:'Space Mono',monospace;
}

/* TOPBAR */

.flight-map-widget .topbar{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:.75rem 1.5rem;
  border-bottom:1px solid rgba(232,184,75,0.15);
}

.flight-map-widget .brand{
  font-size:18px;
  font-weight:600;
  color:#e8b84b;
}

.flight-map-widget .year-tabs{
  display:flex;
  gap:6px;
}

.flight-map-widget .ytab{
  padding:4px 12px;
  border:1px solid #3d4f63;
  background:none;
  color:#3d4f63;
  cursor:pointer;
}

.flight-map-widget .ytab.active{
  border-color:#e8b84b;
  color:#e8b84b;
}

/* MAP */

.flight-map-widget .map-wrap{
  position:relative;
  height:600px;
}

.flight-map-widget svg{
  width:100%;
  height:100%;
}

.flight-map-widget .country{
  fill:#1c2a3e;
  stroke:rgba(255,255,255,0.05);
  stroke-width:.3px;
}

.flight-map-widget .is-origin{
  fill:#e8b84b;
}

.flight-map-widget .is-dest{
  fill:#e85c3a;
}

.flight-map-widget .arc-line{
  stroke:#e8b84b;
  stroke-width:1.6;
  stroke-dasharray:6 5;
  fill:none;
}

.flight-map-widget .origin-dot{
  fill:#e8b84b;
}

.flight-map-widget .pin-core{
  fill:#e85c3a;
}

.flight-map-widget .dest-label{
  font-size:10px;
  fill:#cdc8c0;
}

/* INFO */

.flight-map-widget .info-strip{
  position:absolute;
  bottom:15px;
  left:50%;
  transform:translateX(-50%);
  background:#06080fdd;
  border:1px solid rgba(232,184,75,.2);
  display:flex;
}

.flight-map-widget .info-item{
  padding:10px 18px;
  text-align:center;
}

.flight-map-widget .info-name{
  color:#e8b84b;
  font-size:14px;
}

.flight-map-widget .info-km{
  font-size:11px;
  color:#888;
}

</style>


<div class="topbar">
  <div class="brand">✈ Hành Trình</div>
  <div class="year-tabs" id="yearTabs"></div>
</div>

<div class="map-wrap">
  <svg id="mapSvg"></svg>
  <div class="info-strip" id="infoStrip"></div>
</div>

</section>


<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>

<script>

(function(){

const root = document.querySelector(".flight-map-widget");
const svg = d3.select(root).select("#mapSvg");
const infoStrip = root.querySelector("#infoStrip");

const JOURNEYS = {

2023:{
from:{name:"Vietnam",coord:[106.69,11.14]},
dests:[
{name:"Thailand",label:"Thái Lan",flag:"🇹🇭",coord:[100.5,15.5],km:"1.780"},
{name:"Singapore",label:"Singapore",flag:"🇸🇬",coord:[103.8,1.3],km:"1.170"}
]},

2024:{
from:{name:"Vietnam",coord:[106.69,11.14]},
dests:[
{name:"United States of America",label:"Hoa Kỳ",flag:"🇺🇸",coord:[-98,38],km:"12.900"},
{name:"South Korea",label:"Hàn Quốc",flag:"🇰🇷",coord:[127.8,36],km:"3.560"}
]},

2025:{
from:{name:"Vietnam",coord:[106.69,11.14]},
dests:[
{name:"Japan",label:"Nhật Bản",flag:"🇯🇵",coord:[138,36.5],km:"4.010"},
{name:"Cuba",label:"Cuba",flag:"🇨🇺",coord:[-79.5,22],km:"16.600"},
{name:"Russia",label:"Nga",flag:"🇷🇺",coord:[100,62],km:"7.200"}
]}

};

const YEARS = Object.keys(JOURNEYS);

const width = root.clientWidth;
const height = 600;

const projection = d3.geoNaturalEarth1()
.scale(width/6.2)
.translate([width/2,height/2]);

const path = d3.geoPath(projection);

svg.attr("viewBox","0 0 "+width+" "+height);

const gCountries = svg.append("g");
const gArcs = svg.append("g");
const gPins = svg.append("g");

fetch("https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json")
.then(r=>r.json())
.then(world=>{

const countries = topojson.feature(world,world.objects.countries).features;

gCountries.selectAll("path")
.data(countries)
.enter()
.append("path")
.attr("class","country")
.attr("d",path);

buildTabs();

playYear(YEARS[0]);

});


function buildTabs(){

const tabs = root.querySelector("#yearTabs");

YEARS.forEach(yr=>{

const btn = document.createElement("button");
btn.className="ytab";
btn.innerText=yr;

btn.onclick=()=>playYear(yr);

tabs.appendChild(btn);

});

}


function playYear(year){

gArcs.selectAll("*").remove();
gPins.selectAll("*").remove();

root.querySelectorAll(".ytab").forEach(b=>b.classList.remove("active"));
root.querySelector("#yearTabs").children[YEARS.indexOf(year)].classList.add("active");

const data = JOURNEYS[year];

const from = projection(data.from.coord);

gPins.append("circle")
.attr("class","origin-dot")
.attr("cx",from[0])
.attr("cy",from[1])
.attr("r",5);

infoStrip.innerHTML="";

data.dests.forEach(dest=>{

const to = projection(dest.coord);

const line = gArcs.append("line")
.attr("class","arc-line")
.attr("x1",from[0])
.attr("y1",from[1])
.attr("x2",from[0])
.attr("y2",from[1]);

line.transition()
.duration(2000)
.attr("x2",to[0])
.attr("y2",to[1]);

const g = gPins.append("g")
.attr("transform","translate("+to[0]+","+to[1]+")");

g.append("circle")
.attr("class","pin-core")
.attr("r",4);

g.append("text")
.attr("class","dest-label")
.attr("x",8)
.attr("y",-6)
.text(dest.flag+" "+dest.label);

infoStrip.innerHTML+=`
<div class="info-item">
<div>${dest.flag}</div>
<div class="info-name">${dest.label}</div>
<div class="info-km">${dest.km} km</div>
</div>
`;

});

}

})();

</script>
