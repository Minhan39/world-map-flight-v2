<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

<style>

/* ========================= */
/* MAP STYLE (NO CONFLICT) */
/* ========================= */

#flight-map-container{
height:720px;
background:#06080f;
position:relative;
color:#cdc8c0;
font-family:'Space Mono',monospace;
overflow:hidden;
border-radius:10px;
}

.flight-topbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:12px 20px;
border-bottom:1px solid rgba(232,184,75,.2);
}

.flight-brand{
font-family:'Cormorant Garamond',serif;
font-size:22px;
color:#e8b84b;
}

.flight-year-tabs{
display:flex;
gap:8px;
}

.flight-year-tabs button{
border:1px solid #3d4f63;
background:transparent;
color:#3d4f63;
padding:4px 12px;
cursor:pointer;
}

.flight-year-tabs button.active{
border-color:#e8b84b;
color:#e8b84b;
}

.flight-map-wrap{
height:calc(100% - 60px);
}

#mapSvg{
width:100%;
height:100%;
display:block;
}

.country{
fill:#1c2a3e;
stroke:rgba(255,255,255,.04);
stroke-width:.4px;
}

.country.is-origin{
fill:#e8b84b;
}

.country.is-dest{
fill:#e85c3a;
}

.arc-line{
stroke:#e8b84b;
stroke-width:1.6;
fill:none;
stroke-dasharray:6 4;
}

.flight-info-strip{
position:absolute;
bottom:20px;
left:50%;
transform:translateX(-50%);
display:flex;
background:rgba(6,8,15,.9);
border:1px solid rgba(232,184,75,.2);
}

.info-item{
padding:8px 20px;
text-align:center;
}

.flight-loader{
position:absolute;
inset:0;
display:flex;
align-items:center;
justify-content:center;
background:#06080f;
z-index:10;
font-size:18px;
}

.flight-yr-overlay{
position:absolute;
inset:0;
display:flex;
align-items:center;
justify-content:center;
pointer-events:none;
}

.flight-yr-overlay .yr-num{
font-size:12vw;
color:#e8b84b;
opacity:.05;
}

</style>

</head>

<body class="archive category category-tin-tuc">

<div class="page-wrapper">


<!-- ========================= -->

<div class="inner-container d-flex justify-content-between align-items-center">

<div class="logo">

<img src="https://quanchi.com.vn/wp-content/uploads/2025/11/cropped-logo-quan-chi-sm.png" style="height:60px">
</a>
</div>

<nav class="main-menu navbar-expand-md">

</ul>

</nav>

</div>
</div>
</div>

<!-- ========================= -->
<!-- SECTION MAP -->
<!-- ========================= -->

<section class="blog-section">

<div class="auto-container">

<h1 class="title mb-5 text-center">Hành Trình Quốc Tế</h1>

<div id="flight-map-container">

<div class="flight-topbar">

<div class="flight-brand">✈ VIETNAM WORLD ROUTES</div>

<div class="flight-year-tabs" id="yearTabs"></div>

</div>

<div class="flight-map-wrap" id="mapWrap">

<div class="flight-loader" id="loader">
Đang tải bản đồ...

<div class="yr-num" id="yrNum"></div>

<script>

/* ========================= */
/* DATA */
/* ========================= */

const JOURNEYS={

2023:{
from:{name:"Vietnam",coord:[106.69,11.14]},
dests:[
{name:"Thailand",coord:[100.5,15.5]},
{name:"Singapore",coord:[103.8,1.3]}
]
},

2024:{
from:{name:"Vietnam",coord:[106.69,11.14]},
dests:[
{name:"United States of America",coord:[-98,38]},
{name:"South Korea",coord:[127.8,36]}
]
},

2025:{
from:{name:"Vietnam",coord:[106.69,11.14]},
dests:[
{name:"Japan",coord:[138,36]},
{name:"Russia",coord:[100,62]},
{name:"Cuba",coord:[-79,22]}
]
}

};

const YEARS=Object.keys(JOURNEYS);

const svg=d3.select("#mapSvg");

let projection,pathGen;


/* ========================= */
/* INIT */
/* ========================= */

function init(){

const wrap=document.getElementById("mapWrap");

const W=wrap.clientWidth;
const H=wrap.clientHeight;

projection=d3.geoNaturalEarth1()
.scale(W/6)
.translate([W/2,H/2]);

pathGen=d3.geoPath(projection);

svg.attr("viewBox",`0 0 ${W} ${H}`);

}


/* ========================= */
/* LOAD WORLD MAP */
/* ========================= */

fetch("https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json")
.then(r=>r.json())
.then(world=>{

init();

const countries=topojson.feature(world,world.objects.countries).features;

svg.selectAll("path.country")
.data(countries)
.enter()
.append("path")
.attr("class","country")
.attr("d",pathGen);

buildTabs();

playYear(YEARS[0]);

document.getElementById("loader").style.display="none";

});


/* ========================= */
/* YEAR TABS */
/* ========================= */

function buildTabs(){

const tabs=document.getElementById("yearTabs");

YEARS.forEach(y=>{

const btn=document.createElement("button");

btn.textContent=y;

btn.onclick=()=>playYear(y);

tabs.appendChild(btn);

});

}


/* ========================= */
/* DRAW ROUTES */
/* ========================= */

function playYear(year){

svg.selectAll(".arc-line").remove();

const data=JOURNEYS[year];

const from=projection(data.from.coord);

data.dests.forEach(dest=>{

const to=projection(dest.coord);

svg.append("line")
.attr("class","arc-line")
.attr("x1",from[0])
.attr("y1",from[1])
.attr("x2",to[0])
.attr("y2",to[1]);

});

}


</script>


</body>
