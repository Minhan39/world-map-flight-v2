<section class="flight-map-widget">

<style>

.flight-map-widget{
width:100%;
max-width:1200px;
margin:auto;
background:#06080f;
color:#cdc8c0;
border-radius:8px;
overflow:hidden;
font-family:'Space Mono',monospace;
}

/* topbar */

.flight-map-widget .topbar{
display:flex;
align-items:center;
justify-content:space-between;
padding:.7rem 1.4rem;
border-bottom:1px solid rgba(232,184,75,.15);
}

.flight-map-widget .brand{
color:#e8b84b;
font-weight:600;
}

.flight-map-widget .year-tabs{
display:flex;
gap:.3rem;
}

.flight-map-widget .ytab{
padding:.25rem .7rem;
border:1px solid #3d4f63;
background:none;
color:#3d4f63;
cursor:pointer;
}

.flight-map-widget .ytab.active{
color:#e8b84b;
border-color:#e8b84b;
}

/* progress ring */

.flight-map-widget .pring{
width:34px;
height:34px;
transform:rotate(-90deg);
}

.flight-map-widget .pring circle{
fill:none;
stroke-width:2.2;
}

.flight-map-widget .pring .bg{
stroke:rgba(232,184,75,.12);
}

.flight-map-widget .pring .fg{
stroke:#e8b84b;
stroke-linecap:round;
}

/* map */

.flight-map-widget .map-wrap{
position:relative;
height:600px;
}

.flight-map-widget svg{
width:100%;
height:100%;
}

.flight-map-widget .country{
fill:#1c2a3e;
stroke:rgba(255,255,255,.04);
stroke-width:.35px;
}

.flight-map-widget .country.is-origin{
fill:#e8b84b;
}

.flight-map-widget .country.is-dest{
fill:#e85c3a;
}

.flight-map-widget .arc-line{
stroke:#e8b84b;
stroke-width:1.6;
stroke-dasharray:6 5;
fill:none;
}

.flight-map-widget .origin-dot{
fill:#e8b84b;
}

.flight-map-widget .plane{
fill:white;
}

.flight-map-widget .pin{
fill:#e85c3a;
}

.flight-map-widget .dest-label{
font-size:10px;
fill:#cdc8c0;
}

/* info */

.flight-map-widget .info-strip{
position:absolute;
bottom:15px;
left:50%;
transform:translateX(-50%);
background:#06080fdd;
border:1px solid rgba(232,184,75,.2);
display:flex;
}

.flight-map-widget .info-item{
padding:8px 16px;
text-align:center;
}

.flight-map-widget .info-name{
color:#e8b84b;
}

.flight-map-widget .info-km{
font-size:11px;
color:#888;
}

/* year overlay */

.flight-map-widget .yr-overlay{
position:absolute;
inset:0;
display:flex;
align-items:center;
justify-content:center;
opacity:0;
transition:.4s;
pointer-events:none;
}

.flight-map-widget .yr-overlay.show{
opacity:1;
}

.flight-map-widget .yr-num{
font-size:10vw;
color:rgba(232,184,75,.08);
font-weight:700;
}

</style>


<div class="topbar">

<div class="brand">✈ Hành Trình</div>

<div class="year-tabs" id="yearTabs"></div>

<svg class="pring" viewBox="0 0 34 34">
<circle class="bg" cx="17" cy="17" r="13.5"/>
<circle class="fg" id="pfg" cx="17" cy="17" r="13.5"/>
</svg>

</div>


<div class="map-wrap" id="mapWrap">

<div class="yr-overlay" id="yrOverlay">
<div class="yr-num" id="yrNum"></div>
</div>

<svg id="mapSvg"></svg>

<div class="info-strip" id="infoStrip"></div>

</div>

</section>


<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>

<script>

(function(){

const root=document.querySelector(".flight-map-widget")
if(!root)return

const svg=d3.select(root).select("#mapSvg")
const wrap=root.querySelector("#mapWrap")

let W=wrap.clientWidth
let H=600

const projection=d3.geoNaturalEarth1()
.scale(W/6.1)
.translate([W/2,H/2])

const path=d3.geoPath(projection)

svg.attr("viewBox","0 0 "+W+" "+H)

const gCountries=svg.append("g")
const gLines=svg.append("g")
const gPlanes=svg.append("g")
const gPins=svg.append("g")

const JOURNEYS={
2023:{from:[106.69,11.14],
dests:[
{name:"Thái Lan",flag:"🇹🇭",coord:[100.5,15.5],km:"1780"},
{name:"Singapore",flag:"🇸🇬",coord:[103.8,1.3],km:"1170"}]},
2024:{from:[106.69,11.14],
dests:[
{name:"Hoa Kỳ",flag:"🇺🇸",coord:[-98,38],km:"12900"},
{name:"Hàn Quốc",flag:"🇰🇷",coord:[127.8,36],km:"3560"}]},
2025:{from:[106.69,11.14],
dests:[
{name:"Nhật Bản",flag:"🇯🇵",coord:[138,36],km:"4010"},
{name:"Cuba",flag:"🇨🇺",coord:[-79.5,22],km:"16600"},
{name:"Nga",flag:"🇷🇺",coord:[100,62],km:"7200"}]}
}

const YEARS=Object.keys(JOURNEYS)
let current=0

fetch("https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json")
.then(r=>r.json())
.then(world=>{

const countries=topojson.feature(world,world.objects.countries).features

gCountries.selectAll("path")
.data(countries)
.enter()
.append("path")
.attr("class","country")
.attr("d",path)

buildTabs()
playYear(YEARS[0])

setInterval(nextYear,4500)

})

function buildTabs(){

const tabs=root.querySelector("#yearTabs")

YEARS.forEach((yr,i)=>{

const btn=document.createElement("button")
btn.className="ytab"
btn.innerText=yr

btn.onclick=()=>{
current=i
playYear(yr)
}

tabs.appendChild(btn)

})

}

function nextYear(){
current=(current+1)%YEARS.length
playYear(YEARS[current])
}

function playYear(year){

gLines.selectAll("*").remove()
gPlanes.selectAll("*").remove()
gPins.selectAll("*").remove()

const tabs=root.querySelector("#yearTabs")
tabs.querySelectorAll(".ytab").forEach(b=>b.classList.remove("active"))
tabs.children[current].classList.add("active")

const yrNum=root.querySelector("#yrNum")
const ov=root.querySelector("#yrOverlay")

if(yrNum)yrNum.textContent=year
if(ov){
ov.classList.add("show")
setTimeout(()=>ov.classList.remove("show"),1000)
}

const data=JOURNEYS[year]

const from=projection(data.from)

gPins.append("circle")
.attr("class","origin-dot")
.attr("cx",from[0])
.attr("cy",from[1])
.attr("r",5)

const info=root.querySelector("#infoStrip")
info.innerHTML=""

data.dests.forEach(dest=>{

const to=projection(dest.coord)

const dx=to[0]-from[0]
const dy=to[1]-from[1]

const angle=Math.atan2(dy,dx)*180/Math.PI

const line=gLines.append("line")
.attr("class","arc-line")
.attr("x1",from[0])
.attr("y1",from[1])
.attr("x2",from[0])
.attr("y2",from[1])

line.transition().duration(2000)
.attr("x2",to[0])
.attr("y2",to[1])

const plane=gPlanes.append("text")
.attr("class","plane")
.text("✈")

const start=performance.now()

function animate(now){

const t=Math.min((now-start)/2000,1)

const x=from[0]+dx*t
const y=from[1]+dy*t

plane.attr("transform",
`translate(${x},${y}) rotate(${angle+90})`
)

if(t<1)requestAnimationFrame(animate)

}

requestAnimationFrame(animate)

const g=gPins.append("g")
.attr("transform","translate("+to[0]+","+to[1]+")")

g.append("circle").attr("class","pin").attr("r",4)

g.append("text")
.attr("class","dest-label")
.attr("x",8)
.attr("y",-5)
.text(dest.flag+" "+dest.name)

info.innerHTML+=`
<div class="info-item">
<div>${dest.flag}</div>
<div class="info-name">${dest.name}</div>
<div class="info-km">${dest.km} km</div>
</div>
`

})

}

})()

</script>
