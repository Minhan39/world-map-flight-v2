<section class="flight-map-widget">

<style>

.flight-map-widget{
width:100%;
max-width:1200px;
margin:auto;
background:#06080f;
color:#cdc8c0;
border-radius:8px;
overflow:hidden;
font-family:'Space Mono',monospace;
}

/* top bar */

.flight-map-widget .topbar{
display:flex;
align-items:center;
justify-content:space-between;
padding:10px 20px;
border-bottom:1px solid rgba(232,184,75,.15);
}

.flight-map-widget .brand{
color:#e8b84b;
font-weight:600;
}

.flight-map-widget .year-tabs{
display:flex;
gap:6px;
}

.flight-map-widget .ytab{
border:1px solid #3d4f63;
background:none;
color:#3d4f63;
padding:4px 12px;
cursor:pointer;
}

.flight-map-widget .ytab.active{
border-color:#e8b84b;
color:#e8b84b;
}

/* map */

.flight-map-widget .map-wrap{
height:600px;
position:relative;
}

.flight-map-widget svg{
width:100%;
height:100%;
}

.flight-map-widget .country{
fill:#1c2a3e;
stroke:rgba(255,255,255,0.04);
stroke-width:.35px;
}

.flight-map-widget .country.is-origin{
fill:#e8b84b;
}

.flight-map-widget .country.is-dest{
fill:#e85c3a;
}

.flight-map-widget .arc-line{
stroke:#e8b84b;
stroke-width:1.6;
stroke-dasharray:6 5;
fill:none;
}

.flight-map-widget .origin-dot{
fill:#e8b84b;
}

.flight-map-widget .plane-icon{
fill:white;
}

.flight-map-widget .pin-core{
fill:#e85c3a;
}

.flight-map-widget .dest-label{
font-size:10px;
fill:#cdc8c0;
}

.flight-map-widget .info-strip{
position:absolute;
bottom:15px;
left:50%;
transform:translateX(-50%);
background:#06080fdd;
border:1px solid rgba(232,184,75,.2);
display:flex;
}

.flight-map-widget .info-item{
padding:8px 16px;
text-align:center;
}

.flight-map-widget .info-name{
color:#e8b84b;
}

.flight-map-widget .info-km{
font-size:11px;
color:#888;
}

</style>


<div class="topbar">
<div class="brand">✈ Hành Trình</div>
<div class="year-tabs" id="yearTabs"></div>
</div>

<div class="map-wrap" id="mapWrap">
<svg id="mapSvg"></svg>
<div class="info-strip" id="infoStrip"></div>
</div>

</section>


<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>

<script>

(function(){

const root=document.querySelector(".flight-map-widget")
const svg=d3.select(root).select("#mapSvg")
const wrap=root.querySelector("#mapWrap")

let W=wrap.clientWidth
let H=600

const projection=d3.geoNaturalEarth1()
.scale(W/6.1)
.translate([W/2,H/2])

const path=d3.geoPath(projection)

svg.attr("viewBox","0 0 "+W+" "+H)

const gCountries=svg.append("g")
const gArcs=svg.append("g")
const gPins=svg.append("g")
const gPlanes=svg.append("g")

const JOURNEYS={
2023:{
from:{name:"Vietnam",coord:[106.69,11.14]},
dests:[
{name:"Thailand",label:"Thái Lan",flag:"🇹🇭",coord:[100.5,15.5],km:"1.780"},
{name:"Singapore",label:"Singapore",flag:"🇸🇬",coord:[103.8,1.3],km:"1.170"}
]},
2024:{
from:{name:"Vietnam",coord:[106.69,11.14]},
dests:[
{name:"United States of America",label:"Hoa Kỳ",flag:"🇺🇸",coord:[-98,38],km:"12.900"},
{name:"South Korea",label:"Hàn Quốc",flag:"🇰🇷",coord:[127.8,36],km:"3.560"}
]},
2025:{
from:{name:"Vietnam",coord:[106.69,11.14]},
dests:[
{name:"Japan",label:"Nhật Bản",flag:"🇯🇵",coord:[138,36],km:"4.010"},
{name:"Cuba",label:"Cuba",flag:"🇨🇺",coord:[-79.5,22],km:"16.600"},
{name:"Russia",label:"Nga",flag:"🇷🇺",coord:[100,62],km:"7.200"}
]}
}

const YEARS=Object.keys(JOURNEYS)
let currentYear=0

fetch("https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json")
.then(r=>r.json())
.then(world=>{

const countries=topojson.feature(world,world.objects.countries).features

gCountries.selectAll("path")
.data(countries)
.enter()
.append("path")
.attr("class","country")
.attr("d",path)

buildTabs()

playYear(YEARS[0])

setInterval(nextYear,4500)

})

function buildTabs(){

const tabs=root.querySelector("#yearTabs")

YEARS.forEach((yr,i)=>{

const btn=document.createElement("button")
btn.className="ytab"
btn.innerText=yr

btn.onclick=()=>{
currentYear=i
playYear(yr)
}

tabs.appendChild(btn)

})

}

function nextYear(){

currentYear=(currentYear+1)%YEARS.length
playYear(YEARS[currentYear])

}

function playYear(year){

gArcs.selectAll("*").remove()
gPins.selectAll("*").remove()
gPlanes.selectAll("*").remove()

root.querySelectorAll(".ytab").forEach(b=>b.classList.remove("active"))
root.querySelector("#yearTabs").children[currentYear].classList.add("active")

const data=JOURNEYS[year]

const fromPx=projection(data.from.coord)

gPins.append("circle")
.attr("class","origin-dot")
.attr("cx",fromPx[0])
.attr("cy",fromPx[1])
.attr("r",5)

const info=root.querySelector("#infoStrip")
info.innerHTML=""

data.dests.forEach(dest=>{

const toPx=projection(dest.coord)

const line=gArcs.append("line")
.attr("class","arc-line")
.attr("x1",fromPx[0])
.attr("y1",fromPx[1])
.attr("x2",fromPx[0])
.attr("y2",fromPx[1])

line.transition()
.duration(2000)
.attr("x2",toPx[0])
.attr("y2",toPx[1])

const plane=gPlanes.append("path")
.attr("class","plane-icon")
.attr("d","M0,-6 L2,-1 L8,1 L2,2 L1,5 L0,4 L-1,5 L-2,2 L-8,1 L-2,-1 Z")

const dx=toPx[0]-fromPx[0]
const dy=toPx[1]-fromPx[1]
const angleDeg=Math.atan2(dy,dx)*180/Math.PI

const start=performance.now()

function frame(now){

const raw=Math.min((now-start)/3500,1)

const cx=fromPx[0]+dx*raw
const cy=fromPx[1]+dy*raw

plane.attr(
"transform",
`translate(${cx},${cy}) rotate(${angleDeg+90}) scale(1.2)`
)

if(raw<1)requestAnimationFrame(frame)

}

requestAnimationFrame(frame)

const g=gPins.append("g")
.attr("transform","translate("+toPx[0]+","+toPx[1]+")")

g.append("circle")
.attr("class","pin-core")
.attr("r",4)

g.append("text")
.attr("class","dest-label")
.attr("x",8)
.attr("y",-6)
.text(dest.flag+" "+dest.label)

info.innerHTML+=`
<div class="info-item">
<div>${dest.flag}</div>
<div class="info-name">${dest.label}</div>
<div class="info-km">${dest.km} km</div>
</div>
`

})

}

})()

</script>
